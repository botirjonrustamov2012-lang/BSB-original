<!DOCTYPE html>

<html lang="uz">
<head>
<meta charset="UTF-8">
<title>AI Olami - Contact</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgMove 12s infinite alternate;
color:white;
}

/* Background animation */

@keyframes bgMove{
0%{background-position:0% 50%}
100%{background-position:100% 50%}
}

/* NAVBAR */

nav{
position:fixed;
top:0;
width:100%;
padding:20px;
text-align:center;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(10px);
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

nav a{
color:white;
text-decoration:none;
margin:0 20px;
font-size:18px;
position:relative;
transition:0.3s;
}

/* hover underline animation */

nav a::after{
content:"";
position:absolute;
width:0%;
height:2px;
background:#00f7ff;
left:0;
bottom:-5px;
transition:0.4s;
}

nav a:hover::after{
width:100%;
}

nav a:hover{
color:#00f7ff;
}

/* CONTACT CONTAINER */

.container{
width:420px;
padding:40px;
border-radius:15px;
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
box-shadow:0 0 30px rgba(0,0,0,0.5);
animation:fadeIn 1.5s ease;
margin-top:80px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
text-align:center;
margin-bottom:30px;
letter-spacing:2px;
}

/* input */

.inputBox{
position:relative;
margin-bottom:25px;
}

.inputBox input,
.inputBox textarea{
width:100%;
padding:12px;
border:none;
outline:none;
border-radius:8px;
background:rgba(255,255,255,0.15);
color:white;
font-size:15px;
transition:0.3s;
}

.inputBox textarea{
resize:none;
height:120px;
}

.inputBox label{
position:absolute;
left:12px;
top:12px;
font-size:14px;
color:#ddd;
pointer-events:none;
transition:0.3s;
}

/* floating labels */

.inputBox input:focus + label,
.inputBox input:valid + label,
.inputBox textarea:focus + label,
.inputBox textarea:valid + label{
top:-10px;
font-size:12px;
color:#00f7ff;
}

/* glow */

.inputBox input:focus,
.inputBox textarea:focus{
box-shadow:0 0 10px #00f7ff;
}

/* button */

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
background:linear-gradient(45deg,#00f7ff,#0072ff);
color:white;
cursor:pointer;
transition:0.4s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 0 20px #00f7ff;
}

.footer{
text-align:center;
margin-top:20px;
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<nav>
<a href="index.html">Home</a>
<a href="about.html">About</a>
<a href="gallery.html">Gallery</a>
<a href="Contact.html">Contact</a>
</nav>

<div class="container">

<h1>Contact AI Olami</h1>

<form>

<div class="inputBox">
<input type="text" required>
<label>Ismingiz</label>
</div>

<div class="inputBox">
<input type="email" required>
<label>Email</label>
</div>

<div class="inputBox">
<textarea required></textarea>
<label>Xabaringiz</label>
</div>

<button type="submit">Xabar yuborish</button>

</form>

<div class="footer">
AI Olami bilan bog'lanish
</div>

</div>

</body>
</html>
